# Site settings
title: Gregorio Nastasi
tagline: Data Science & Causal Inference
description: "Personal blog exploring data science, causal inference, and analytics"
url: "https://gregnst.github.io"
baseurl: "/blog"
lang: en

# Author information
author:
  name: Gregorio Nastasi
  email: gregorionastasi@gmail.com
  twitter: ""
  linkedin: gregorionastasi

# Pagination
paginate: 10
paginate_path: /page:num/

# Avatar & Social
avatar: /blog/assets/img/profile.jpg

social:
  links:
    - https://www.linkedin.com/in/gregorionastasi/
    - https://rateyourmusic.com/~Perennial_Quest

# Build settings
remote_theme: cotes2020/jekyll-theme-chirpy@latest

plugins:
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-archive
  - jekyll-sitemap

# Chirpy theme configuration
theme_mode: auto  # light, dark, or auto
date_format: "%b %d, %Y"

# Only show About in nav (other nav items removed)
header_pages: []

# Archives configuration
archives:
  enabled:
    - categories
    - tags
  layouts:
    category: archive-category
    tag: archive-tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

# SEO and social
# google_site_verification: ""
# webmaster_verifications:
#   google: ""

defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false
